aid: amazon-data-lifecycle-manager
name: Amazon Data Lifecycle Manager
description: >-
  Amazon Data Lifecycle Manager provides an automated way to manage the
  lifecycle of your AWS resources. Using lifecycle policies, you can automate
  the creation, retention, and deletion of Amazon EBS snapshots and EBS-backed
  AMIs, reducing storage costs and simplifying backup management. Policies target
  EBS volumes and EC2 instances using tags, execute on configurable schedules,
  and apply flexible retention rules based on count or age.
