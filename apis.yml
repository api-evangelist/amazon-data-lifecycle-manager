  - type: Features
    data:
      - name: EBS Snapshot Automation
        description: >-
          Automatically create, copy, and delete EBS snapshots on configurable
          schedules using tag-based targeting of volumes across AWS accounts.
      - name: AMI Lifecycle Management
        description: >-
          Automate the creation and deregistration of Amazon Machine Images
          from EC2 instances on schedules to maintain a library of AMIs.
      - name: Flexible Retention Rules
        description: >-
          Retain snapshots by count (keep the last N) or by age (keep for N
          days/weeks/months/years), automatically deleting older snapshots.
      - name: Tag-Based Targeting
        description: >-
          Target EBS volumes or EC2 instances using resource tags for policy
          scope, enabling granular backup control without managing resource lists.
      - name: Cross-Region Copy
        description: >-
          Configure schedules to copy snapshots to other AWS regions for
          disaster recovery and geographic redundancy automatically.
      - name: Fast Snapshot Restore
        description: >-
          Enable fast snapshot restore on snapshots created by DLM policies
          to dramatically reduce EBS volume initialization time.
      - name: Event-Based Policies
        description: >-
          Trigger snapshot sharing and copying workflows in response to
          CloudWatch Events for cross-account snapshot automation.
  - type: UseCases
    data:
      - name: Automated Daily Backups
        description: >-
          Schedule daily EBS volume snapshots with automated retention of the
          last 7 or 30 days of backups without manual intervention.
      - name: Compliance and Audit Retention
        description: >-
          Meet regulatory backup retention requirements by defining long-term
          retention policies (monthly/yearly) for compliance snapshots.
      - name: Disaster Recovery
        description: >-
          Automatically copy EBS snapshots to secondary AWS regions to enable
          cross-region disaster recovery with minimal RTO and RPO.
      - name: Golden AMI Pipeline
        description: >-
          Automate the creation of hardened EC2 AMI images from approved
          instances and manage their lifecycle for deployment fleets.
      - name: Storage Cost Optimization
        description: >-
          Reduce EBS snapshot storage costs by automatically deleting outdated
          snapshots based on configurable age or count retention rules.
  - type: Integrations
    data:
      - name: Amazon EBS
        description: >-
          Native integration with Amazon EBS for snapshot creation, retention,
          and deletion of volumes across the AWS account.
      - name: Amazon EC2
        description: >-
          Target EC2 instances with IMAGE_MANAGEMENT policies to automate
          AMI creation from running or stopped instances.
      - name: Amazon CloudWatch
        description: >-
          Event-based DLM policies are triggered by Amazon CloudWatch Events
          for cross-account snapshot sharing scenarios.
      - name: AWS Backup
        description: >-
          Complementary to DLM, AWS Backup provides centralized backup management
          across multiple AWS services including EBS, RDS, and DynamoDB.
      - name: AWS IAM
        description: >-
          DLM uses IAM execution roles to assume permissions for creating and
          deleting snapshots on behalf of the lifecycle policy.
      - name: AWS Organizations
        description: >-
          Cross-account snapshot sharing policies use AWS Organizations to
          share EBS snapshots with member accounts automatically.
